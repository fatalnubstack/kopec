<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% block title %}Bořen{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f5;
      color: #1a1a1a;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #2d6a2d;
      color: #fff;
      padding: 14px 20px;
      text-align: center;
    }
    header h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.02em; }
    header p  { font-size: 0.8rem; opacity: 0.8; margin-top: 2px; }

    nav {
      display: flex;
      background: #235523;
    }
    nav a {
      flex: 1;
      text-align: center;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      padding: 10px 4px;
      font-size: 0.78rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      border-bottom: 3px solid transparent;
    }
    nav a.active, nav a:hover { color: #fff; border-bottom-color: #7bc67b; }

    main {
      flex: 1;
      padding: 24px 20px;
      max-width: 520px;
      margin: 0 auto;
      width: 100%;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 24px 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      margin-bottom: 16px;
    }

    h2 { font-size: 1.2rem; margin-bottom: 16px; }
    h3 { font-size: 1rem; margin-bottom: 10px; color: #444; }

    label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 6px; }

    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.1rem;
      border: 2px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus { border-color: #2d6a2d; }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-size: 1.1rem;
      font-weight: 700;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin-top: 14px;
      transition: opacity .15s;
    }
    .btn:active { opacity: .8; }
    .btn-green  { background: #2d6a2d; color: #fff; }
    .btn-blue   { background: #1a6ea8; color: #fff; }

    .big-time {
      font-size: 3rem;
      font-weight: 800;
      text-align: center;
      color: #2d6a2d;
      letter-spacing: -0.02em;
      margin: 10px 0;
    }

    .info { font-size: 0.9rem; color: #666; text-align: center; margin-top: 6px; }

    .error { color: #c0392b; font-size: 0.9rem; margin-top: 8px; display: none; }
    .success { color: #2d6a2d; font-size: 0.9rem; margin-top: 8px; text-align: center; }

    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th { text-align: left; padding: 8px 6px; border-bottom: 2px solid #e0e0e0; color: #555; font-size: 0.78rem; text-transform: uppercase; }
    td { padding: 10px 6px; border-bottom: 1px solid #f0f0f0; }
    tr:last-child td { border-bottom: none; }
    .rank { font-weight: 700; color: #2d6a2d; }

    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab {
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid #2d6a2d;
      background: transparent;
      color: #2d6a2d;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
    }
    .tab.active { background: #2d6a2d; color: #fff; }

    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { text-align: center; padding: 12px; font-size: 0.75rem; color: #aaa; }
  </style>
</head>
<body>
  <header>
    <h1>Kopec Bořen</h1>
    <p>u Bíliny · Výškový rekordník</p>
  </header>
  <nav>
    <a href="/start" {% if active == 'start' %}class="active"{% endif %}>▲ Start</a>
    <a href="/finish" {% if active == 'finish' %}class="active"{% endif %}>🏁 Cíl</a>
    <a href="/leaderboard" {% if active == 'leaderboard' %}class="active"{% endif %}>🏆 Žebříček</a>
  </nav>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer>Bořen Tracker</footer>
</body>
</html>

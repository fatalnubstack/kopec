<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% block title %}Bořen{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #12141a;
      --surface:     #1a1d24;
      --surface2:    #22252e;
      --accent:      #7a9e8a;
      --accent-dim:  rgba(122,158,138,0.1);
      --warm:        #c4956a;
      --text:        #e8e6e0;
      --muted:       #7a8898;
      --border:      rgba(255,255,255,0.07);
      --border-a:    rgba(122,158,138,0.2);
      /* legacy aliases */
      --card:        #1a1d24;
      --card2:       #22252e;
      --green:       #7a9e8a;
      --green-btn:   #6a8e7a;
      --gold:        #c4956a;
    }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
      padding-bottom: 24px;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border-radius: 12px;
      padding: 20px;
      margin: 12px 16px;
      border: 1px solid var(--border);
    }
    .card-sm {
      background: var(--surface2);
      border-radius: 10px;
      padding: 14px 16px;
      border: 1px solid var(--border);
    }

    /* Buttons */
    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      text-align: center;
      text-decoration: none;
      transition: opacity .2s, transform .15s;
    }
    .btn:active { opacity: .8; transform: scale(.99); }
    .btn-green { background: var(--accent); color: #0a100d; }
    .btn-outline {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    /* Inputs */
    label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 8px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }
    input[type="text"], input[type="email"] {
      width: 100%;
      padding: 13px 16px;
      font-size: 1rem;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      outline: none;
      transition: border-color .2s;
    }
    input[type="text"]:focus,
    input[type="email"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder,
    input[type="email"]::placeholder { color: var(--muted); }

    /* Tags */
    .tag {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 3px;
      border: 1px solid var(--border-a);
      color: var(--accent);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* Tabs */
    .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .tab {
      padding: 6px 14px;
      border-radius: 4px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all .15s;
    }
    .tab.active { background: var(--accent); color: #0a100d; border-color: var(--accent); }

    /* Tables */
    table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    th {
      text-align: left;
      padding: 8px 6px;
      border-bottom: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-weight: 600;
    }
    td { padding: 11px 6px; border-bottom: 1px solid var(--border); }
    tr:last-child td { border-bottom: none; }
    .rank { font-weight: 700; color: var(--warm); }

    /* Misc */
    .big-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 5.5rem;
      font-weight: 300;
      text-align: center;
      color: var(--text);
      letter-spacing: -0.02em;
      line-height: 1;
    }
    .info { font-size: 0.88rem; color: var(--muted); text-align: center; }
    .gold { color: var(--warm); }
    .green { color: var(--accent); }

    .error { color: #c07070; font-size: 0.85rem; margin-top: 8px; display: none; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.15);
      border-top-color: rgba(255,255,255,.7);
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Section label */
    .sec-label {
      display: block;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 20px 16px 10px;
    }

    /* Card label */
    .card-label {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-label::before {
      content: '';
      display: inline-block;
      width: 18px;
      height: 1px;
      background: var(--accent);
      flex-shrink: 0;
    }

    /* Fade in animation for hero */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Bottom nav */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(18,20,26,0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-top: 1px solid var(--border);
      display: flex;
      padding: 10px 0 max(10px, env(safe-area-inset-bottom));
      max-width: 480px;
      margin: 0 auto;
    }
    .bottom-nav a {
      flex: 1;
      text-align: center;
      color: var(--muted);
      text-decoration: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 4px 0;
      transition: color .15s;
    }
    .bottom-nav a .nav-icon { display: block; font-size: 1.15rem; margin-bottom: 3px; }
    .bottom-nav a.active { color: var(--accent); }

    .has-nav main { padding-bottom: 80px; }
  </style>
</head>
<body class="{% block body_class %}has-nav{% endblock %}">
  <main>
    {% block content %}{% endblock %}
  </main>

  <div style="text-align:center; padding: 12px 20px 80px; font-size:0.68rem; color:var(--muted); line-height:1.6;">
    🚧 Testovací verze · Chybu nebo připomínku pošli na
    <a href="mailto:vaclav.nap@gmail.com" style="color:var(--muted); text-decoration:underline;">vaclav.nap@gmail.com</a>
  </div>

  {% block nav %}
  <nav class="bottom-nav">
    <a href="/" {% if active == 'home' %}class="active"{% endif %}>
      <span class="nav-icon">⛰️</span>Bořen
    </a>
    <a href="/start" {% if active == 'start' %}class="active"{% endif %}>
      <span class="nav-icon">▲</span>Start
    </a>
    <a href="/nastenka" {% if active == 'nastenka' %}class="active"{% endif %}>
      <span class="nav-icon">🪧</span>Nástěnka
    </a>
    <a href="/leaderboard" {% if active == 'leaderboard' %}class="active"{% endif %}>
      <span class="nav-icon">🥇</span>Žebříček
    </a>
  </nav>
  {% endblock %}
</body>
</html>

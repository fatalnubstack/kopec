{% extends "base.html" %}
{% set active = 'home' %}
{% block title %}Bořen{% endblock %}
{% block content %}

<style>
  @keyframes rainFall {
    from { transform: translateY(-30px); opacity: 0.7; }
    to   { transform: translateY(290px); opacity: 0.3; }
  }
  @keyframes snowFall {
    0%   { transform: translateY(-10px) translateX(0px); opacity: 0.9; }
    50%  { transform: translateY(140px) translateX(12px); opacity: 0.7; }
    100% { transform: translateY(290px) translateX(-8px); opacity: 0; }
  }
  @keyframes cloudDrift {
    0%,100% { transform: translateX(0); }
    50%     { transform: translateX(8px); }
  }
  @keyframes twinkle {
    0%,100% { opacity: 0.8; }
    50%     { opacity: 0.3; }
  }
  @keyframes lightning {
    0%,90%,100% { opacity: 0; }
    92%,96%     { opacity: 0.15; }
  }
</style>

<!-- Hero — dynamická scéna -->
<div style="position:relative; height:280px; overflow:hidden; border-radius:0 0 24px 24px;">
  <svg id="sceneSVG" viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg"
       style="width:100%; height:100%; display:block;" preserveAspectRatio="xMidYMid slice">
    <defs>
      <linearGradient id="skyGrad" x1="0" y1="0" x2="0" y2="1">
        <stop id="s1" offset="0%"  stop-color="#0a1628"/>
        <stop id="s2" offset="55%" stop-color="#1a3a6e"/>
        <stop id="s3" offset="100%" stop-color="#2a5a9e"/>
      </linearGradient>
      <linearGradient id="hillGrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#1a2215"/>
        <stop offset="100%" stop-color="#0e1510"/>
      </linearGradient>
    </defs>

    <!-- Obloha -->
    <rect id="skyRect" width="400" height="260" fill="url(#skyGrad)"/>

    <!-- Blesk (bouřka) -->
    <rect id="lightning" width="400" height="260" fill="#e8f0ff" opacity="0"
          style="animation: lightning 4s infinite;"/>

    <!-- Hvězdy (noc) -->
    <g id="stars" opacity="0">
      <circle cx="20"  cy="15" r="1"   fill="#fff" style="animation:twinkle 2.1s infinite"/>
      <circle cx="55"  cy="8"  r="1.2" fill="#fff" style="animation:twinkle 3.4s infinite 0.5s"/>
      <circle cx="90"  cy="20" r="0.8" fill="#fff" style="animation:twinkle 2.8s infinite 1s"/>
      <circle cx="130" cy="10" r="1"   fill="#fff" style="animation:twinkle 1.9s infinite 0.3s"/>
      <circle cx="165" cy="25" r="1.2" fill="#fff" style="animation:twinkle 3.1s infinite 0.8s"/>
      <circle cx="200" cy="8"  r="0.9" fill="#fff" style="animation:twinkle 2.5s infinite 1.2s"/>
      <circle cx="240" cy="18" r="1.1" fill="#fff" style="animation:twinkle 2.2s infinite 0.2s"/>
      <circle cx="275" cy="6"  r="0.8" fill="#fff" style="animation:twinkle 3.6s infinite 0.7s"/>
      <circle cx="310" cy="22" r="1"   fill="#fff" style="animation:twinkle 2.0s infinite 1.5s"/>
      <circle cx="350" cy="12" r="1.2" fill="#fff" style="animation:twinkle 2.7s infinite 0.4s"/>
      <circle cx="380" cy="28" r="0.9" fill="#fff" style="animation:twinkle 3.2s infinite 0.9s"/>
      <circle cx="40"  cy="40" r="0.7" fill="#dde" style="animation:twinkle 2.4s infinite 1.1s"/>
      <circle cx="115" cy="38" r="0.8" fill="#dde" style="animation:twinkle 3.0s infinite 0.6s"/>
      <circle cx="190" cy="42" r="0.7" fill="#dde" style="animation:twinkle 2.6s infinite 1.3s"/>
      <circle cx="260" cy="35" r="0.9" fill="#dde" style="animation:twinkle 2.3s infinite 0.1s"/>
      <circle cx="330" cy="38" r="0.7" fill="#dde" style="animation:twinkle 3.5s infinite 0.8s"/>
    </g>

    <!-- Měsíc (jasná noc) -->
    <g id="moon" opacity="0">
      <circle cx="330" cy="38" r="20" fill="#fffde0" opacity="0.15"/>
      <circle cx="330" cy="38" r="14" fill="#fffbe8"/>
    </g>

    <!-- Mraky -->
    <g id="clouds" opacity="0">
      <!-- Mrak 1 -->
      <g style="animation:cloudDrift 8s ease-in-out infinite">
        <ellipse cx="80"  cy="55" rx="55" ry="22" fill="rgba(180,195,210,0.6)"/>
        <ellipse cx="105" cy="48" rx="35" ry="18" fill="rgba(190,205,215,0.5)"/>
        <ellipse cx="55"  cy="50" rx="30" ry="15" fill="rgba(175,190,205,0.5)"/>
      </g>
      <!-- Mrak 2 -->
      <g style="animation:cloudDrift 11s ease-in-out infinite 2s">
        <ellipse cx="280" cy="45" rx="65" ry="25" fill="rgba(170,185,200,0.55)"/>
        <ellipse cx="310" cy="36" rx="40" ry="18" fill="rgba(180,195,210,0.5)"/>
        <ellipse cx="255" cy="42" rx="35" ry="16" fill="rgba(165,180,195,0.5)"/>
      </g>
      <!-- Mrak 3 (zataženo) -->
      <g id="cloud3" opacity="0" style="animation:cloudDrift 14s ease-in-out infinite 1s">
        <ellipse cx="170" cy="35" rx="80" ry="28" fill="rgba(150,165,180,0.6)"/>
        <ellipse cx="145" cy="28" rx="45" ry="20" fill="rgba(155,170,185,0.5)"/>
        <ellipse cx="200" cy="25" rx="50" ry="22" fill="rgba(145,160,175,0.5)"/>
      </g>
    </g>

    <!-- Déšť -->
    <g id="rain" opacity="0">
      <line x1="30"  y1="0" x2="25"  y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1.2" style="animation:rainFall 0.8s linear infinite"/>
      <line x1="70"  y1="0" x2="65"  y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1"   style="animation:rainFall 0.8s linear infinite 0.15s"/>
      <line x1="110" y1="0" x2="105" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1.2" style="animation:rainFall 0.8s linear infinite 0.3s"/>
      <line x1="150" y1="0" x2="145" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1"   style="animation:rainFall 0.8s linear infinite 0.05s"/>
      <line x1="190" y1="0" x2="185" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1.2" style="animation:rainFall 0.8s linear infinite 0.22s"/>
      <line x1="230" y1="0" x2="225" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1"   style="animation:rainFall 0.8s linear infinite 0.38s"/>
      <line x1="270" y1="0" x2="265" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1.2" style="animation:rainFall 0.8s linear infinite 0.12s"/>
      <line x1="310" y1="0" x2="305" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1"   style="animation:rainFall 0.8s linear infinite 0.27s"/>
      <line x1="350" y1="0" x2="345" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1.2" style="animation:rainFall 0.8s linear infinite 0.42s"/>
      <line x1="390" y1="0" x2="385" y2="40" stroke="rgba(150,180,220,0.5)" stroke-width="1"   style="animation:rainFall 0.8s linear infinite 0.08s"/>
      <!-- druhá vrstva posunutá -->
      <line x1="50"  y1="0" x2="45"  y2="40" stroke="rgba(140,170,210,0.4)" stroke-width="1"   style="animation:rainFall 0.9s linear infinite 0.45s"/>
      <line x1="130" y1="0" x2="125" y2="40" stroke="rgba(140,170,210,0.4)" stroke-width="1"   style="animation:rainFall 0.9s linear infinite 0.2s"/>
      <line x1="210" y1="0" x2="205" y2="40" stroke="rgba(140,170,210,0.4)" stroke-width="1"   style="animation:rainFall 0.9s linear infinite 0.35s"/>
      <line x1="290" y1="0" x2="285" y2="40" stroke="rgba(140,170,210,0.4)" stroke-width="1"   style="animation:rainFall 0.9s linear infinite 0.1s"/>
      <line x1="370" y1="0" x2="365" y2="40" stroke="rgba(140,170,210,0.4)" stroke-width="1"   style="animation:rainFall 0.9s linear infinite 0.55s"/>
    </g>

    <!-- Sníh -->
    <g id="snow" opacity="0">
      <circle cx="40"  cy="0" r="2.5" fill="rgba(240,245,255,0.85)" style="animation:snowFall 2.2s linear infinite"/>
      <circle cx="90"  cy="0" r="2"   fill="rgba(240,245,255,0.8)"  style="animation:snowFall 2.8s linear infinite 0.4s"/>
      <circle cx="140" cy="0" r="3"   fill="rgba(240,245,255,0.9)"  style="animation:snowFall 2.0s linear infinite 0.9s"/>
      <circle cx="190" cy="0" r="2"   fill="rgba(240,245,255,0.75)" style="animation:snowFall 2.5s linear infinite 0.2s"/>
      <circle cx="240" cy="0" r="2.5" fill="rgba(240,245,255,0.85)" style="animation:snowFall 3.0s linear infinite 1.1s"/>
      <circle cx="290" cy="0" r="2"   fill="rgba(240,245,255,0.8)"  style="animation:snowFall 2.3s linear infinite 0.6s"/>
      <circle cx="340" cy="0" r="3"   fill="rgba(240,245,255,0.9)"  style="animation:snowFall 2.7s linear infinite 0.3s"/>
      <circle cx="380" cy="0" r="2"   fill="rgba(240,245,255,0.75)" style="animation:snowFall 2.1s linear infinite 0.8s"/>
      <circle cx="65"  cy="0" r="2"   fill="rgba(240,245,255,0.7)"  style="animation:snowFall 2.9s linear infinite 1.4s"/>
      <circle cx="165" cy="0" r="2.5" fill="rgba(240,245,255,0.8)"  style="animation:snowFall 2.4s linear infinite 0.7s"/>
      <circle cx="265" cy="0" r="2"   fill="rgba(240,245,255,0.75)" style="animation:snowFall 2.6s linear infinite 1.2s"/>
      <circle cx="365" cy="0" r="2.5" fill="rgba(240,245,255,0.85)" style="animation:snowFall 2.2s linear infinite 0.5s"/>
    </g>

    <!-- Vzdálené kopce (background) -->
    <path d="M0,260 L0,185 Q40,178 80,175 Q120,172 155,168 Q185,165 210,162 Q235,165 260,168 Q295,172 330,175 Q365,178 400,182 L400,260 Z"
          fill="#1c2a1c" opacity="0.7"/>

    <!-- Bořen — hlavní silueta -->
    <path d="M0,260 L0,215
             Q35,212 70,208
             Q105,204 135,196
             Q158,190 175,180
             Q190,170 203,158
             Q215,146 225,133
             Q233,122 240,112
             Q246,103 252,97
             Q257,91 262,97
             Q268,106 275,118
             Q283,132 293,148
             Q305,166 322,182
             Q342,198 368,210
             Q385,217 400,220
             L400,260 Z"
          fill="url(#hillGrad)"/>

    <!-- Přední lesní okraj -->
    <path d="M0,260 L0,248
             Q20,242 35,250 Q45,256 60,248 Q72,241 85,252
             Q98,260 115,248 Q128,238 145,250 Q158,260 175,248
             Q188,238 205,252 Q218,262 235,248 Q248,236 265,250
             Q278,262 295,248 Q308,237 325,252 Q338,264 355,250
             Q368,239 385,252 Q395,262 400,255
             L400,260 Z"
          fill="#0d140d"/>
  </svg>

  <!-- Počasí nahoře -->
  <div id="weatherStrip" style="position:absolute; top:16px; left:16px; right:16px; display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.35); backdrop-filter:blur(8px); border-radius:10px; padding:8px 14px;">
      <span id="wLeft" style="font-size:0.88rem; color:#fff;"></span>
      <span style="font-size:0.82rem; color:rgba(255,255,255,0.7);">🌅 <span id="wSunset"></span></span>
    </div>
  </div>

  <!-- Název -->
  <div style="position:absolute; bottom:20px; left:20px;">
    <p style="font-size:0.7rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:var(--green); margin-bottom:4px;">⛰ BOŘEN</p>
    <h1 style="font-size:2.6rem; font-weight:800; line-height:1; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.5);">Bořen</h1>
    <p style="font-size:0.9rem; color:rgba(255,255,255,0.65); margin-top:4px;">u Bíliny</p>
  </div>
</div>

<!-- Stat: dobrodruzi -->
<div style="margin: 12px 16px;">
  <div class="card-sm" style="display:flex; align-items:center; gap:14px;">
    <div style="width:40px; height:40px; background:rgba(90,138,58,0.2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;">🧗</div>
    <div>
      <p id="statsText" style="font-weight:700; font-size:0.95rem;">Načítám…</p>
      <p id="statsSubtext" style="font-size:0.8rem; color:var(--muted); margin-top:2px;"></p>
    </div>
  </div>
</div>

<!-- Info karty -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin: 0 16px;">
  <div class="card-sm" style="text-align:center; padding:16px 12px;">
    <p style="font-size:1.5rem; font-weight:800; color:var(--gold);">539 m</p>
    <p style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px;">Nadmořská výška</p>
  </div>
  <div class="card-sm" style="text-align:center; padding:16px 12px;">
    <p style="font-size:1.5rem; font-weight:800; color:var(--gold);">~2 km</p>
    <p style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px;">Délka trasy</p>
  </div>
</div>

<!-- Tagy -->
<div style="margin: 10px 16px; display:flex; gap:8px; flex-wrap:wrap;">
  <span class="tag">Lesní</span>
  <span class="tag">Skalnatý</span>
  <span class="tag">Výhled</span>
  <span class="tag">Středně obtížný</span>
</div>

<!-- CTA -->
<div style="margin: 20px 16px 12px;">
  <a href="/start" class="btn btn-green">⛰ Začít výstup</a>
  <a href="/leaderboard" class="btn btn-outline" style="margin-top:10px;">🏆 Žebříček</a>
</div>

<script>
  // ── Scéna ──────────────────────────────────────────────────────────────────
  function applyScene(code, hour) {
    const isNight = hour >= 21 || hour < 6;
    const isMorning = hour >= 6 && hour < 9;
    const isEvening = hour >= 18 && hour < 21;

    const isRain  = [51,53,55,61,63,65,80,81,82,95,96,99].includes(code);
    const isSnow  = [71,73,75,77].includes(code);
    const isFog   = [45,48].includes(code);
    const isCloud = [3].includes(code) || isFog;
    const isPartly= [1,2].includes(code);
    const isStorm = [95,96,99].includes(code);

    // Barvy oblohy
    let s1, s2, s3;
    if (isNight) {
      s1 = '#020810'; s2 = '#060e1e'; s3 = '#0a1828';
    } else if (isMorning) {
      s1 = '#1a1030'; s2 = '#c8602a'; s3 = '#e8904a';
    } else if (isEvening) {
      s1 = '#0a1020'; s2 = '#8a3020'; s3 = '#c8602a';
    } else if (isRain || isStorm) {
      s1 = '#1a2028'; s2 = '#2a3040'; s3 = '#3a4050';
    } else if (isSnow) {
      s1 = '#4a5560'; s2 = '#7a8a95'; s3 = '#a8b8c0';
    } else if (isFog) {
      s1 = '#6a7880'; s2 = '#8a9aA2'; s3 = '#aabbc2';
    } else if (isCloud) {
      s1 = '#2a3540'; s2 = '#4a5a68'; s3 = '#6a7a88';
    } else if (isPartly) {
      s1 = '#0e2a50'; s2 = '#1e5a9a'; s3 = '#4a90c8';
    } else {
      // Jasno den
      s1 = '#0a1e3c'; s2 = '#1a5090'; s3 = '#4a90c8';
    }

    document.getElementById('s1').setAttribute('stop-color', s1);
    document.getElementById('s2').setAttribute('stop-color', s2);
    document.getElementById('s3').setAttribute('stop-color', s3);

    // Noc: hvězdy + měsíc
    document.getElementById('stars').setAttribute('opacity', isNight ? '1' : '0');
    document.getElementById('moon').setAttribute('opacity', (isNight && !isCloud && !isRain) ? '1' : '0');

    // Mraky
    const cloudOp = isRain||isStorm ? '1' : isCloud ? '0.95' : isPartly ? '0.7' : isSnow ? '0.8' : '0';
    document.getElementById('clouds').setAttribute('opacity', cloudOp);
    document.getElementById('cloud3').setAttribute('opacity', (isCloud||isRain||isStorm) ? '1' : '0');

    // Déšť
    document.getElementById('rain').setAttribute('opacity', isRain ? '1' : '0');
    // Sníh
    document.getElementById('snow').setAttribute('opacity', isSnow ? '1' : '0');
    // Blesk
    if (isStorm) {
      document.getElementById('lightning').style.animation = 'lightning 3s infinite';
    }
  }

  // ── Počasí API ──────────────────────────────────────────────────────────────
  const WMO = {
    0:['☀️','Jasno'],1:['🌤️','Převážně jasno'],2:['⛅','Polojasno'],3:['☁️','Zataženo'],
    45:['🌫️','Mlha'],48:['🌫️','Mlha'],51:['🌦️','Mrholení'],53:['🌦️','Mrholení'],55:['🌧️','Mrholení'],
    61:['🌧️','Déšť'],63:['🌧️','Déšť'],65:['🌧️','Silný déšť'],
    71:['🌨️','Sněžení'],73:['🌨️','Sněžení'],75:['❄️','Silné sněžení'],77:['❄️','Sněhové krupky'],
    80:['🌦️','Přeháňky'],81:['🌧️','Přeháňky'],82:['⛈️','Bouřkové přeháňky'],
    95:['⛈️','Bouřka'],96:['⛈️','Bouřka'],99:['⛈️','Bouřka'],
  };

  const hour = new Date().getHours();

  // Aplikuj výchozí scénu podle hodiny (než přijde API)
  applyScene(0, hour);

  fetch('https://api.open-meteo.com/v1/forecast?latitude=50.556&longitude=13.775&current=temperature_2m,weathercode&daily=sunset&timezone=Europe%2FPrague&forecast_days=1')
    .then(r=>r.json()).then(d=>{
      const code = d.current.weathercode;
      const [icon,desc] = WMO[code]||['🌡️','Počasí'];
      const temp = Math.round(d.current.temperature_2m);
      const sunset = d.daily.sunset[0].split('T')[1];

      applyScene(code, hour);

      document.getElementById('wLeft').textContent = `${icon} ${temp} °C · ${desc}`;
      document.getElementById('wSunset').textContent = sunset;
      document.getElementById('weatherStrip').style.display = 'block';
    }).catch(()=>{ applyScene(0, hour); });

  // ── Statistiky ──────────────────────────────────────────────────────────────
  fetch('/api/stats').then(r=>r.json()).then(d=>{
    const n = d.last_24h;
    const t = document.getElementById('statsText');
    const s = document.getElementById('statsSubtext');
    if (n === 0) {
      t.textContent = 'Dnes tu ještě nikdo nebyl';
      t.style.color = 'var(--gold)';
      s.textContent = 'Budeš první dobrodruh!';
    } else {
      const slovo = n===1?'dobrodruh':n<5?'dobrodruzi':'dobrodruhů';
      t.textContent = `${n} ${slovo} za posledních 24h`;
      s.textContent = 'Přidej se k nim!';
    }
  }).catch(()=>{ document.getElementById('statsText').textContent = 'Výstupy na Bořen'; });
</script>
{% endblock %}

{% extends "base.html" %}
{% set active = 'home' %}
{% block title %}Bořen{% endblock %}
{% block content %}

<style>
  @keyframes rainFall {
    from { transform: translateY(-30px); opacity:.7; }
    to   { transform: translateY(300px); opacity:.2; }
  }
  @keyframes snowFall {
    0%   { transform: translateY(-10px) translateX(0); opacity:.9; }
    50%  { transform: translateY(140px) translateX(10px); opacity:.7; }
    100% { transform: translateY(290px) translateX(-8px); opacity:0; }
  }
  @keyframes twinkle { 0%,100%{opacity:.85} 50%{opacity:.2} }
  @keyframes lightning { 0%,88%,100%{opacity:0} 90%,95%{opacity:.25} }
  .rain-line {
    position:absolute; width:1.5px; background:rgba(160,200,240,0.55);
    animation: rainFall linear infinite;
  }
  .snow-dot {
    position:absolute; border-radius:50%; background:rgba(240,245,255,0.9);
    animation: snowFall linear infinite;
  }
  .star {
    position:absolute; border-radius:50%; background:#fff;
    animation: twinkle ease-in-out infinite;
  }
</style>

<!-- Hero — reálná fotka + dynamický CSS overlay -->
<div style="position:relative; height:280px; overflow:hidden; border-radius:0 0 24px 24px;">
  <img id="heroImg" src="/static/boren.jpg" alt="Kopec Bořen"
       style="width:100%; height:100%; object-fit:cover; object-position:center 30%; transition: filter 1s ease;">

  <!-- Barevný overlay (mění se dle počasí/času) -->
  <div id="colorOverlay" style="position:absolute; inset:0; transition: background 1s ease;
       background: linear-gradient(to bottom, rgba(135,184,212,0.15) 0%, rgba(17,26,17,0.75) 100%);"></div>

  <!-- Déšť -->
  <div id="rainLayer" style="position:absolute; inset:0; display:none; pointer-events:none;">
    <div class="rain-line" style="left:5%;  height:30px; animation-duration:.78s; animation-delay:0s;"></div>
    <div class="rain-line" style="left:12%; height:28px; animation-duration:.82s; animation-delay:.1s;"></div>
    <div class="rain-line" style="left:20%; height:32px; animation-duration:.72s; animation-delay:.25s;"></div>
    <div class="rain-line" style="left:28%; height:28px; animation-duration:.88s; animation-delay:.05s;"></div>
    <div class="rain-line" style="left:36%; height:30px; animation-duration:.76s; animation-delay:.35s;"></div>
    <div class="rain-line" style="left:44%; height:32px; animation-duration:.82s; animation-delay:.15s;"></div>
    <div class="rain-line" style="left:52%; height:28px; animation-duration:.72s; animation-delay:.4s;"></div>
    <div class="rain-line" style="left:60%; height:30px; animation-duration:.86s; animation-delay:.08s;"></div>
    <div class="rain-line" style="left:68%; height:32px; animation-duration:.78s; animation-delay:.28s;"></div>
    <div class="rain-line" style="left:76%; height:28px; animation-duration:.82s; animation-delay:.18s;"></div>
    <div class="rain-line" style="left:84%; height:30px; animation-duration:.74s; animation-delay:.45s;"></div>
    <div class="rain-line" style="left:92%; height:32px; animation-duration:.88s; animation-delay:.03s;"></div>
  </div>

  <!-- Sníh -->
  <div id="snowLayer" style="position:absolute; inset:0; display:none; pointer-events:none;">
    <div class="snow-dot" style="width:5px;height:5px;left:8%;  animation-duration:2.2s; animation-delay:0s;"></div>
    <div class="snow-dot" style="width:4px;height:4px;left:20%; animation-duration:2.8s; animation-delay:.4s;"></div>
    <div class="snow-dot" style="width:6px;height:6px;left:33%; animation-duration:2.0s; animation-delay:.9s;"></div>
    <div class="snow-dot" style="width:4px;height:4px;left:47%; animation-duration:2.5s; animation-delay:.2s;"></div>
    <div class="snow-dot" style="width:5px;height:5px;left:60%; animation-duration:3.0s; animation-delay:1.1s;"></div>
    <div class="snow-dot" style="width:4px;height:4px;left:72%; animation-duration:2.3s; animation-delay:.6s;"></div>
    <div class="snow-dot" style="width:6px;height:6px;left:85%; animation-duration:2.7s; animation-delay:.3s;"></div>
    <div class="snow-dot" style="width:5px;height:5px;left:14%; animation-duration:2.9s; animation-delay:1.4s;"></div>
    <div class="snow-dot" style="width:4px;height:4px;left:55%; animation-duration:2.4s; animation-delay:.7s;"></div>
  </div>

  <!-- Hvězdy (noc) -->
  <div id="starLayer" style="position:absolute; inset:0; display:none; pointer-events:none;">
    <div class="star" style="width:2px;height:2px;top:8%; left:10%; animation-duration:2.1s;"></div>
    <div class="star" style="width:2px;height:2px;top:5%; left:25%; animation-duration:3.4s;animation-delay:.5s;"></div>
    <div class="star" style="width:3px;height:3px;top:12%;left:42%; animation-duration:2.8s;animation-delay:1s;"></div>
    <div class="star" style="width:2px;height:2px;top:6%; left:58%; animation-duration:1.9s;animation-delay:.3s;"></div>
    <div class="star" style="width:2px;height:2px;top:10%;left:72%; animation-duration:3.1s;animation-delay:.8s;"></div>
    <div class="star" style="width:3px;height:3px;top:4%; left:85%; animation-duration:2.5s;animation-delay:1.2s;"></div>
    <div class="star" style="width:2px;height:2px;top:15%;left:18%; animation-duration:2.2s;animation-delay:.2s;"></div>
    <div class="star" style="width:2px;height:2px;top:8%; left:65%; animation-duration:3.6s;animation-delay:.7s;"></div>
    <!-- Měsíc -->
    <div style="position:absolute;top:8%;right:12%;width:26px;height:26px;border-radius:50%;background:#fffbe8;box-shadow:0 0 18px 8px rgba(255,251,200,0.15);"></div>
  </div>

  <!-- Blesk -->
  <div id="lightningLayer" style="position:absolute;inset:0;background:#e8f0ff;opacity:0;pointer-events:none;animation:lightning 3.5s infinite;display:none;"></div>

  <!-- Počasí strip nahoře -->
  <div id="weatherStrip" style="position:absolute; top:16px; left:16px; right:16px; display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; background:rgba(0,0,0,0.4); backdrop-filter:blur(8px); border-radius:10px; padding:8px 14px;">
      <span id="wLeft" style="font-size:0.88rem; color:#fff;"></span>
      <span style="font-size:0.82rem; color:rgba(255,255,255,0.7);">🌅 <span id="wSunset"></span></span>
    </div>
  </div>

  <!-- Název -->
  <div style="position:absolute; bottom:20px; left:20px;">
    <p style="font-size:0.7rem; font-weight:700; letter-spacing:0.12em; text-transform:uppercase; color:#7bc67b; margin-bottom:4px;">⛰ BOŘEN</p>
    <h1 style="font-size:2.6rem; font-weight:800; line-height:1; color:#fff; text-shadow:0 2px 10px rgba(0,0,0,0.6);">Bořen</h1>
    <p style="font-size:0.9rem; color:rgba(255,255,255,0.65); margin-top:4px;">u Bíliny</p>
  </div>
</div>

<!-- Stat: dobrodruzi -->
<div style="margin: 12px 16px;">
  <div class="card-sm" style="display:flex; align-items:center; gap:14px;">
    <div style="width:40px; height:40px; background:rgba(90,138,58,0.2); border-radius:10px; display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0;">🥾</div>
    <div>
      <p id="statsText" style="font-weight:700; font-size:0.95rem;">Načítám…</p>
      <p id="statsSubtext" style="font-size:0.8rem; color:var(--muted); margin-top:2px;"></p>
    </div>
  </div>
</div>

<!-- Info karty -->
<div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; margin: 0 16px;">
  <div class="card-sm" style="text-align:center; padding:16px 12px;">
    <p style="font-size:1.5rem; font-weight:800; color:var(--gold);">539 m</p>
    <p style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px;">Nadmořská výška</p>
  </div>
  <div class="card-sm" style="text-align:center; padding:16px 12px;">
    <p style="font-size:1.5rem; font-weight:800; color:var(--gold);">~2 km</p>
    <p style="font-size:0.7rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; margin-top:4px;">Délka trasy</p>
  </div>
</div>

<!-- Tagy -->
<div style="margin: 10px 16px; display:flex; gap:8px; flex-wrap:wrap;">
  <span class="tag">Lesní</span>
  <span class="tag">Skalnatý</span>
  <span class="tag">Výhled</span>
  <span class="tag">Středně obtížný</span>
</div>

<!-- CTA -->
<div style="margin: 20px 16px 12px;">
  <a href="/start" class="btn btn-green">🥾 Začít výstup</a>
  <a href="/leaderboard" class="btn btn-outline" style="margin-top:10px;">🏆 Žebříček</a>
</div>

<script>
  const WMO = {
    0:['☀️','Jasno'],1:['🌤️','Převážně jasno'],2:['⛅','Polojasno'],3:['☁️','Zataženo'],
    45:['🌫️','Mlha'],48:['🌫️','Mlha'],51:['🌦️','Mrholení'],53:['🌦️','Mrholení'],55:['🌧️','Mrholení'],
    61:['🌧️','Déšť'],63:['🌧️','Déšť'],65:['🌧️','Silný déšť'],
    71:['🌨️','Sněžení'],73:['🌨️','Sněžení'],75:['❄️','Silné sněžení'],77:['❄️','Kroupy'],
    80:['🌦️','Přeháňky'],81:['🌧️','Přeháňky'],82:['⛈️','Bouřkové přeháňky'],
    95:['⛈️','Bouřka'],96:['⛈️','Bouřka'],99:['⛈️','Bouřka'],
  };

  function applyScene(code, hour) {
    const img     = document.getElementById('heroImg');
    const overlay = document.getElementById('colorOverlay');
    const rain    = document.getElementById('rainLayer');
    const snow    = document.getElementById('snowLayer');
    const stars   = document.getElementById('starLayer');
    const light   = document.getElementById('lightningLayer');

    const isNight   = hour >= 21 || hour < 6;
    const isMorning = hour >= 6  && hour < 9;
    const isEvening = hour >= 18 && hour < 21;
    const isRain    = [51,53,55,61,63,65,80,81,82,95,96,99].includes(code);
    const isSnow    = [71,73,75,77].includes(code);
    const isFog     = [45,48].includes(code);
    const isCloud   = [3].includes(code);
    const isStorm   = [95,96,99].includes(code);

    // CSS filter na fotku
    let filter = 'brightness(1) saturate(1)';
    let bg = 'linear-gradient(to bottom, rgba(135,184,212,0.1) 0%, rgba(17,26,17,0.75) 100%)';

    if (isNight) {
      filter = 'brightness(0.18) saturate(0.3)';
      bg = 'linear-gradient(to bottom, rgba(5,10,30,0.7) 0%, rgba(5,10,20,0.88) 100%)';
    } else if (isMorning) {
      filter = 'brightness(0.75) sepia(0.3) saturate(1.2)';
      bg = 'linear-gradient(to bottom, rgba(180,80,20,0.35) 0%, rgba(17,26,17,0.75) 100%)';
    } else if (isEvening) {
      filter = 'brightness(0.6) sepia(0.45) saturate(0.9)';
      bg = 'linear-gradient(to bottom, rgba(140,40,20,0.5) 0%, rgba(17,26,17,0.82) 100%)';
    } else if (isStorm) {
      filter = 'brightness(0.38) saturate(0.2)';
      bg = 'linear-gradient(to bottom, rgba(10,15,25,0.7) 0%, rgba(17,26,17,0.88) 100%)';
    } else if (isRain) {
      filter = 'brightness(0.52) saturate(0.3)';
      bg = 'linear-gradient(to bottom, rgba(30,45,60,0.55) 0%, rgba(17,26,17,0.82) 100%)';
    } else if (isSnow) {
      filter = 'brightness(0.68) saturate(0.2)';
      bg = 'linear-gradient(to bottom, rgba(180,200,220,0.28) 0%, rgba(17,26,17,0.75) 100%)';
    } else if (isFog) {
      filter = 'brightness(0.7) saturate(0.25) contrast(0.85)';
      bg = 'linear-gradient(to bottom, rgba(150,165,175,0.45) 0%, rgba(17,26,17,0.8) 100%)';
    } else if (isCloud) {
      filter = 'brightness(0.62) saturate(0.4)';
      bg = 'linear-gradient(to bottom, rgba(60,75,90,0.45) 0%, rgba(17,26,17,0.8) 100%)';
    }

    img.style.filter = filter;
    overlay.style.background = bg;
    rain.style.display   = isRain   ? 'block' : 'none';
    snow.style.display   = isSnow   ? 'block' : 'none';
    stars.style.display  = isNight  ? 'block' : 'none';
    light.style.display  = isStorm  ? 'block' : 'none';
  }

  const hour = new Date().getHours();
  applyScene(0, hour); // výchozí

  fetch('https://api.open-meteo.com/v1/forecast?latitude=50.556&longitude=13.775&current=temperature_2m,weathercode&daily=sunset&timezone=Europe%2FPrague&forecast_days=1')
    .then(r=>r.json()).then(d=>{
      const code = d.current.weathercode;
      const [icon, desc] = WMO[code] || ['🌡️','Počasí'];
      const temp   = Math.round(d.current.temperature_2m);
      const sunset = d.daily.sunset[0].split('T')[1];

      applyScene(code, hour);

      document.getElementById('wLeft').textContent = `${icon} ${temp} °C · ${desc}`;
      document.getElementById('wSunset').textContent = sunset;
      document.getElementById('weatherStrip').style.display = 'block';
    }).catch(()=>{ applyScene(0, hour); });

  fetch('/api/stats').then(r=>r.json()).then(d=>{
    const n = d.last_24h;
    const t = document.getElementById('statsText');
    const s = document.getElementById('statsSubtext');
    if (n === 0) {
      t.textContent = 'Dnes tu ještě nikdo nebyl';
      t.style.color = 'var(--gold)';
      s.textContent = 'Budeš první dobrodruh!';
    } else {
      const slovo = n===1?'dobrodruh':n<5?'dobrodruzi':'dobrodruhů';
      t.textContent = `${n} ${slovo} za posledních 24h`;
      s.textContent = 'Přidej se k nim!';
    }
  }).catch(()=>{ document.getElementById('statsText').textContent = 'Výstupy na Bořen'; });
</script>
{% endblock %}

{% extends "base.html" %}
{% set active = 'start' %}
{% block title %}Bořen – Start{% endblock %}
{% block content %}

<!-- Počasí -->
<div id="weatherCard" style="margin:16px 16px 0; display:none;">
  <div class="card-sm" style="display:flex; justify-content:space-between; align-items:center;">
    <span id="wLeft" style="font-size:0.9rem;"></span>
    <span style="font-size:0.82rem; color:var(--muted);">🌅 <span id="wSunset"></span></span>
  </div>
</div>

<!-- Start formulář -->
<div class="card" id="startCard">
  <p style="font-size:0.7rem; font-weight:700; letter-spacing:0.1em; text-transform:uppercase; color:var(--green); margin-bottom:8px;">▲ STARTOVNÍ ČÁRA</p>
  <h2 style="font-size:1.4rem; font-weight:800; margin-bottom:6px;">Připrav se!</h2>
  <p style="color:var(--muted); font-size:0.88rem; margin-bottom:20px;">Zadej jméno a spusť časomíru.</p>

  <form id="startForm">
    <label for="name">Tvoje jméno / přezdívka</label>
    <input type="text" id="name" name="name" placeholder="Např. Jan Novák nebo Rychlonožka" maxlength="80" autocomplete="off" autofocus>

    <label for="city" style="margin-top:14px;">Město <span style="font-weight:400; text-transform:none; letter-spacing:0; color:var(--muted);">(nepovinné)</span></label>
    <input type="text" id="city" name="city" placeholder="Např. Bílina, Praha…" maxlength="60" autocomplete="off">

    <p class="error" id="error"></p>
    <button type="submit" class="btn btn-green" id="submitBtn" style="margin-top:16px;">▲ Začít výstup</button>
  </form>
</div>

<!-- Aktivní výstup -->
<div class="card" id="activeClimb" style="display:none; text-align:center; padding:32px 20px;">
  <div style="font-size:2.5rem; margin-bottom:12px;">🧗</div>
  <p style="font-size:0.8rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px;">Výstup probíhá</p>
  <p id="activeName" style="font-size:1.6rem; font-weight:800; color:var(--text); margin-bottom:16px;"></p>
  <div style="background:var(--card2); border-radius:12px; padding:14px; margin-bottom:20px;">
    <p style="font-size:0.85rem; color:var(--muted);">Naskenuj QR kód na vrcholu až dorazíš</p>
    <p style="font-size:1.3rem; margin-top:4px;">🏁</p>
  </div>
  <button class="btn btn-outline" id="cancelBtn" style="font-size:0.88rem; padding:14px;">Zrušit výstup</button>
</div>

<script>
  const STORAGE_KEY = 'boren_climb';
  const NAME_KEY = 'boren_name';

  const WMO = {
    0:['☀️','Jasno'],1:['🌤️','Převážně jasno'],2:['⛅','Polojasno'],3:['☁️','Zataženo'],
    45:['🌫️','Mlha'],48:['🌫️','Mlha'],51:['🌦️','Mrholení'],53:['🌦️','Mrholení'],55:['🌧️','Mrholení'],
    61:['🌧️','Déšť'],63:['🌧️','Déšť'],65:['🌧️','Silný déšť'],
    71:['🌨️','Sněžení'],73:['🌨️','Sněžení'],75:['❄️','Silné sněžení'],
    80:['🌦️','Přeháňky'],81:['🌧️','Přeháňky'],82:['⛈️','Bouřkové přeháňky'],
    95:['⛈️','Bouřka'],96:['⛈️','Bouřka'],99:['⛈️','Bouřka'],
  };

  fetch('https://api.open-meteo.com/v1/forecast?latitude=50.556&longitude=13.775&current=temperature_2m,weathercode&daily=sunset&timezone=Europe%2FPrague&forecast_days=1')
    .then(r=>r.json()).then(d=>{
      const [icon,desc] = WMO[d.current.weathercode]||['🌡️','Počasí'];
      const temp = Math.round(d.current.temperature_2m);
      const sunset = d.daily.sunset[0].split('T')[1];
      document.getElementById('wLeft').textContent = `${icon} ${temp} °C · ${desc}`;
      document.getElementById('wSunset').textContent = sunset;
      document.getElementById('weatherCard').style.display = 'block';
    }).catch(()=>{});

  const CITY_KEY = 'boren_city';
  const savedName = localStorage.getItem(NAME_KEY);
  const savedCity = localStorage.getItem(CITY_KEY);
  if (savedName) document.getElementById('name').value = savedName;
  if (savedCity) document.getElementById('city').value = savedCity;

  const BANNED = ['pica','picus','píca','píčus','zmrd','kokot','kunda','pizda','negr','cigan','cigán','retard','debil','kurva','hovno','bastard'];
  function hasBanned(str) { const s = str.toLowerCase(); return BANNED.some(w => s.includes(w)); }

  function showActive(data) {
    document.getElementById('startCard').style.display = 'none';
    document.getElementById('activeClimb').style.display = 'block';
    document.getElementById('activeName').textContent = data.name;
  }

  const existing = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (existing && existing.climb_id) showActive(existing);

  document.getElementById('cancelBtn').addEventListener('click', () => {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  });

  document.getElementById('startForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const name = document.getElementById('name').value.trim();
    const city = document.getElementById('city').value.trim();
    const err  = document.getElementById('error');
    const btn  = document.getElementById('submitBtn');

    if (!name) {
      err.textContent = 'Zadej prosím své jméno.';
      err.style.display = 'block';
      return;
    }
    if (hasBanned(name) || hasBanned(city)) {
      err.textContent = 'Jméno obsahuje nevhodné slovo.';
      err.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Spouštím…';
    err.style.display = 'none';

    const body = new FormData();
    body.append('name', name);
    body.append('city', city);

    try {
      const res = await fetch('/api/start', { method: 'POST', body });
      if (!res.ok) {
        const data = await res.json();
        err.textContent = data.detail || 'Chyba serveru.';
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = '▲ Začít výstup';
        return;
      }
      const data = await res.json();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      localStorage.setItem(NAME_KEY, name);
      if (city) localStorage.setItem(CITY_KEY, city);
      showActive(data);
    } catch {
      err.textContent = 'Nepodařilo se spojit se serverem.';
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = '▲ Začít výstup';
    }
  });
</script>
{% endblock %}

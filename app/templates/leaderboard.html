{% extends "base.html" %}
{% set active = 'leaderboard' %}
{% block title %}Bořen – Žebříček{% endblock %}
{% block content %}

<div style="padding: 24px 16px 12px;">
  <div class="card-label">🏆 Žebříček</div>
  <h2 style="font-family:'Cormorant Garamond',serif; font-size:2.8rem; font-weight:300; letter-spacing:-0.01em; margin-bottom:6px;">Bořen</h2>
  <p id="stats" style="font-size:0.85rem; color:var(--muted); min-height:1.2em; line-height:1.6;"></p>
</div>

<div style="margin: 0 16px 12px;">
  <div class="tabs" id="periodTabs">
    <button class="tab active" data-days="">Vše</button>
    <button class="tab" data-days="30">30 dní</button>
    <button class="tab" data-days="90">90 dní</button>
    <button class="tab" data-days="180">180 dní</button>
    <button class="tab" data-days="365">1 rok</button>
  </div>
</div>

<div class="card">
  <p style="font-size:0.65rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:16px;">⚡ Nejrychlejší výstup</p>
  <div id="fastestBody"></div>
  <p id="fastestEmpty" class="info" style="display:none; padding:16px 0;">Žádné záznamy.</p>
</div>

<div class="card">
  <p style="font-size:0.65rem; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color:var(--muted); margin-bottom:16px;">🔁 Nejvíce výstupů</p>
  <div id="mostBody"></div>
  <p id="mostEmpty" class="info" style="display:none; padding:16px 0;">Žádné záznamy.</p>
</div>

<script>
  async function loadLeaderboard(days) {
    const url = days ? `/api/leaderboard?days=${days}` : '/api/leaderboard';
    try {
      const res  = await fetch(url);
      const data = await res.json();
      renderFastest(data.fastest);
      renderMost(data.most);
    } catch {}
  }

  function renderFastest(rows) {
    const body  = document.getElementById('fastestBody');
    const empty = document.getElementById('fastestEmpty');
    body.innerHTML = '';
    if (!rows.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    rows.forEach(r => {
      const medal = r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : r.rank === 3 ? '🥉' : null;
      const rankEl = medal
        ? `<span style="font-size:1.1rem;">${medal}</span>`
        : `<span style="font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:300; color:var(--muted);">${r.rank}</span>`;

      body.insertAdjacentHTML('beforeend', `
        <div style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);">
          <div style="width:28px; text-align:center; flex-shrink:0;">${rankEl}</div>
          <div style="flex:1; min-width:0;">
            <p style="font-size:0.9rem; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${esc(r.name)}</p>
            ${r.city ? `<p style="font-size:0.72rem; color:var(--muted); margin-top:1px;">${esc(r.city)}</p>` : ''}
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <p style="font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:400; color:var(--accent);">${esc(r.duration_fmt)}</p>
            <p style="font-size:0.68rem; color:var(--muted); margin-top:1px;">${esc(r.date)}</p>
          </div>
        </div>
      `);
    });
    const last = body.lastElementChild;
    if (last) last.style.borderBottom = 'none';
  }

  function renderMost(rows) {
    const body  = document.getElementById('mostBody');
    const empty = document.getElementById('mostEmpty');
    body.innerHTML = '';
    if (!rows.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    rows.forEach(r => {
      const medal = r.rank === 1 ? '🥇' : r.rank === 2 ? '🥈' : r.rank === 3 ? '🥉' : null;
      const rankEl = medal
        ? `<span style="font-size:1.1rem;">${medal}</span>`
        : `<span style="font-family:'Cormorant Garamond',serif; font-size:1.3rem; font-weight:300; color:var(--muted);">${r.rank}</span>`;

      body.insertAdjacentHTML('beforeend', `
        <div style="display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid var(--border);">
          <div style="width:28px; text-align:center; flex-shrink:0;">${rankEl}</div>
          <div style="flex:1;">
            <p style="font-size:0.9rem; font-weight:500;">${esc(r.name)}</p>
          </div>
          <div style="text-align:right; flex-shrink:0;">
            <p style="font-family:'Cormorant Garamond',serif; font-size:1.5rem; font-weight:300; color:var(--warm);">${r.total}×</p>
            <p style="font-size:0.68rem; color:var(--muted); margin-top:1px;">${esc(r.best_fmt)}</p>
          </div>
        </div>
      `);
    });
    const last = body.lastElementChild;
    if (last) last.style.borderBottom = 'none';
  }

  function esc(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  document.getElementById('periodTabs').addEventListener('click', (e) => {
    const btn = e.target.closest('.tab');
    if (!btn) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    loadLeaderboard(btn.dataset.days ? parseInt(btn.dataset.days) : null);
  });

  loadLeaderboard(null);

  fetch('/api/stats').then(r=>r.json()).then(d=>{
    const n = d.last_24h;
    const slovo = n===1?'dobrodruh':n<5?'dobrodruzi':'dobrodruhů';
    document.getElementById('stats').textContent = n === 0
      ? 'Dnes tu ještě nikdo nebyl — buď první!'
      : `Za posledních 24 hodin zdolalo Bořen ${n} ${slovo}`;
  }).catch(()=>{});
</script>
{% endblock %}

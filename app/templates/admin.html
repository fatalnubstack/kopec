<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bořen – Admin</title>
  <style>
    body { font-family: sans-serif; padding: 20px; color: #1a1a1a; }
    h1   { margin-bottom: 16px; }
    table { border-collapse: collapse; width: 100%; font-size: 0.9rem; }
    th, td { border: 1px solid #ddd; padding: 8px 10px; text-align: left; }
    th { background: #f0f0f0; }
    tr:hover td { background: #f9f9f9; }
    .del {
      background: #c0392b; color: #fff; border: none; padding: 4px 10px;
      border-radius: 4px; cursor: pointer; font-size: 0.8rem;
    }
    .incomplete { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h1>Admin – záznamy výstupů</h1>
  <p style="margin-bottom:16px; color:#555;">Celkem záznamů: <strong>{{ rows|length }}</strong></p>
  {% if rows %}
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Jméno</th><th>Start</th><th>Cíl</th><th>Čas</th><th>Smazat</th>
      </tr>
    </thead>
    <tbody>
      {% for r in rows %}
      <tr class="{{ '' if r.completed else 'incomplete' }}">
        <td>{{ r.id }}</td>
        <td>{{ r.name }}</td>
        <td>{{ r.start }}</td>
        <td>{{ r.finish }}</td>
        <td>{{ r.duration }}</td>
        <td>
          <form method="post" action="/admin/delete/{{ r.id }}"
                onsubmit="return confirm('Smazat záznam #{{ r.id }} ({{ r.name }})?')">
            <button class="del" type="submit">Smazat</button>
          </form>
        </td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
  {% else %}
  <p>Žádné záznamy.</p>
  {% endif %}
</body>
</html>
